<style>
/* PALETTE DE COULEURS BTC_IPHONE */
:root {
    --bg-dark: #090b11;
    --bg-gradient: linear-gradient(180deg, #121622 0%, #06070a 100%);
    --card-dark: #121520;
    --orange-primary: #ff6a3d;
    --text-main: #ffffff;
    --text-muted: #6b7588;
    --accent-gradient: linear-gradient(135deg, #ff6a3d 0%, #9a4eff 100%);
    --accent-blue: #0088cc;
    --danger: #ff4d6d;
}

body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    padding-bottom: 100px;
}

/* HEADER PROFILE */
.profile-header {
    background: linear-gradient(180deg, #1c253d 0%, var(--bg-dark) 100%);
    padding: 50px 20px 40px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}

.avatar-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
}

.avatar-main {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid var(--orange-primary);
    padding: 4px;
    background: var(--bg-dark);
}

.vip-floating-badge {
    position: absolute;
    bottom: 5px;
    right: 5px;
    background: var(--accent-gradient);
    color: #fff;
    font-size: 10px;
    font-weight: 900;
    padding: 4px 10px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    letter-spacing: 0.5px;
}

.user-phone {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 1px;
}

/* MENU GRID */
.menu-section {
    padding: 25px 20px;
}

.menu-group-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
}

.menu-list {
    background: var(--card-dark);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.03);
}

.menu-item {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: 0.2s;
}

.menu-item:active { background: rgba(255,255,255,0.04); }
.menu-item:last-child { border-bottom: none; }

.menu-icon { width: 35px; font-size: 22px; }
.menu-label { flex: 1; font-size: 15px; font-weight: 600; }
.menu-arrow { color: var(--text-muted); font-size: 18px; opacity: 0.5; }

/* SPECIAL BUTTONS */
.telegram-card {
    background: rgba(0, 136, 204, 0.06);
    border: 1px solid rgba(0, 136, 204, 0.3);
    color: #38bdf8;
}

.logout-card {
    background: rgba(255, 77, 109, 0.04);
    border: 1px solid rgba(255, 77, 109, 0.2);
    color: var(--danger);
}

/* BARRE DE NAVIGATION COMMUNE */
.menu-bottom {
    position: fixed; 
    bottom: 0; 
    width: 100%;
    background: #0b0e17; 
    display: flex; 
    justify-content: space-around;
    padding: 12px 0 28px; 
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    z-index: 1000;
}

.menu-item-nav { 
    color: var(--text-muted); 
    text-align: center; 
    font-size: 11px; 
    text-decoration: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    cursor: pointer;
}

.menu-item-nav.active { color: var(--orange-primary); }
.menu-item-nav span { display: block; font-size: 20px; font-style: normal; }
</style>

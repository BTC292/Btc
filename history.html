<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC_IPHONE | Portefeuille</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* PALETTE DE COULEURS BTC_IPHONE */
:root {
    --bg-dark: #090b11;
    --bg-gradient: linear-gradient(180deg, #121622 0%, #06070a 100%);
    --card-dark: #121520;
    --orange-primary: #ff6a3d;
    --text-main: #ffffff;
    --text-muted: #6b7588;
    --accent-gradient: linear-gradient(135deg, #ff6a3d 0%, #9a4eff 100%);
    --success: #10b981;
    --danger: #ff4d6d;
}

body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    padding-bottom: 100px;
}

/* HEADER */
.header {
    padding: 25px 20px 10px;
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SECTION SOLDE GLOBAL */
.wallet-container {
    background: var(--card-dark);
    margin: 0 15px 20px;
    padding: 24px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    text-align: center;
}

.wallet-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
}

.wallet-balance {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 20px;
}

/* BOUTONS ACTIONS (DEPOT / RETRAIT) */
.wallet-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.action-btn {
    background: rgba(255, 255, 255, 0.03);
    color: white;
    padding: 14px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
}

.action-btn.primary {
    background: var(--accent-gradient);
    border: none;
}

.action-btn:active { transform: scale(0.96); }

/* HISTORIQUE DES TRANSACTIONS */
.section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
    margin: 25px 15px 12px 25px;
    letter-spacing: 1px;
}

.tx-list {
    margin: 0 15px;
}

.tx-card {
    background: var(--card-dark);
    margin-bottom: 10px;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.tx-info-left {
    display: flex;
    align-items: center;
    gap: 14px;
}

.tx-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.tx-icon.deposit { background: rgba(16, 185, 129, 0.1); }
.tx-icon.withdraw { background: rgba(255, 77, 109, 0.1); }

.tx-type { font-size: 14px; font-weight: 700; margin-bottom: 3px; display: block; }
.tx-date { font-size: 11px; color: var(--text-muted); }

.tx-amount { font-size: 15px; font-weight: 800; text-align: right; }
.tx-amount.deposit { color: var(--success); }
.tx-amount.withdraw { color: var(--danger); }

.tx-status { font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; font-weight: 600; }

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
}

/* BARRE DE NAVIGATION COMMUNE */
.menu-bottom {
    position: fixed; 
    bottom: 0; 
    width: 100%;
    background: #0b0e17; 
    display: flex; 
    justify-content: space-around;
    padding: 12px 0 28px; 
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    z-index: 1000;
}

.menu-item { 
    color: var(--text-muted); 
    text-align: center; 
    font-size: 11px; 
    text-decoration: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    cursor: pointer;
}

.menu-item.active { color: var(--orange-primary); }
.menu-item span { display: block; font-size: 20px; font-style: normal; }
</style>
</head>

<body>

<div class="header">BTC_IPHONE</div>

<div class="wallet-container">
    <div class="wallet-label">Solde Total Disponible</div>
    <div class="wallet-balance" id="walletBalance">0 XOF</div>

    <div class="wallet-actions">
        <a href="deposit.html" class="action-btn primary">
            <span>📥</span> Dépôt
        </a>
        <a href="withdraw.html" class="action-btn">
            <span>📤</span> Retrait
        </a>
    </div>
</div>

<div class="section-title">Historique Récent</div>
<div class="tx-list" id="transactionContainer">
    <div class="empty-state">Chargement des transactions...</div>
</div>

<div class="menu-bottom">
    <div class="menu-item" onclick="location.href='dashboard.html'"><span>🏠</span>Accueil</div>
    <div class="menu-item" onclick="location.href='product.html'"><span>🎓</span>Investir</div>
    <div class="menu-item" onclick="location.href='team.html'"><span>👥</span>Équipe</div>
    <div class="menu-item active" onclick="location.href='account.html'"><span>👤</span>Profil</div>
</div>

<script>
const client = supabase.createClient(
    "https://ycswpdydsgoqplkqtpsd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

let userId = localStorage.getItem("user_id");

async function initWallet() {
    if(!userId) return;

    // 1. Récupération du Solde de l'utilisateur
    const { data: user, error: userErr } = await client.from("users").select("balance").eq("id", userId).single();
    if(user) {
        document.getElementById("walletBalance").innerText = user.balance.toLocaleString() + " XOF";
    }

    // 2. Récupération des transactions (Dépôts et Retraits)
    const { data: txs, error: txErr } = await client.from("transactions")
        .select("*")
        .eq("user_id", userId)
        .order("created_at", { ascending: false });

    const container = document.getElementById("transactionContainer");
    container.innerHTML = ""; // Vider le loader

    if(!txs || txs.length === 0) {
        container.innerHTML = `<div class="empty-state">Aucune transaction enregistrée</div>`;
        return;
    }

    txs.forEach(tx => {
        const isDeposit = tx.type === 'deposit' || tx.type === 'depot';
        const icon = isDeposit ? '📥' : '📤';
        const typeClass = isDeposit ? 'deposit' : 'withdraw';
        const typeText = isDeposit ? 'Dépôt Réussi' : 'Retrait Portefeuille';
        const sign = isDeposit ? '+' : '-';
        
        // Formatage de la date en local
        const dateObj = new Date(tx.created_at);
        const formattedDate = dateObj.toLocaleDateString('fr-FR', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });

        const txCard = document.createElement("div");
        txCard.className = "tx-card";
        txCard.innerHTML = `
            <div class="tx-info-left">
                <div class="tx-icon ${typeClass}">${icon}</div>
                <div>
                    <span class="tx-type">${typeText}</span>
                    <span class="tx-date">${formattedDate}</span>
                </div>
            </div>
            <div>
                <div class="tx-amount ${typeClass}">${sign} ${tx.amount.toLocaleString()} XOF</div>
                <span class="tx-status">${tx.status || 'Complété'}</span>
            </div>
        `;
        container.appendChild(txCard);
    });
}

initWallet();
</script>
</body>
</html>

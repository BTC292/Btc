<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC_IPHONE | Recharge</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* PALETTE DE COULEURS BTC_IPHONE */
        :root {
            --bg-dark: #090b11;
            --bg-gradient: linear-gradient(180deg, #121622 0%, #06070a 100%);
            --card-dark: #121520;
            --orange-primary: #ff6a3d;
            --text-main: #ffffff;
            --text-muted: #6b7588;
            --accent-gradient: linear-gradient(135deg, #ff6a3d 0%, #9a4eff 100%);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg-dark); 
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main); 
            padding: 20px; 
        }

        /* HEADER */
        .header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-top: 10px;
        }
        .back-btn { 
            font-size: 24px; 
            color: var(--orange-primary); 
            text-decoration: none; 
            margin-right: 15px; 
            cursor: pointer; 
            font-weight: bold;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* CARTE DE DÉPÔT CONTAINER */
        .deposit-card { 
            background: var(--card-dark); 
            border-radius: 24px; 
            padding: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }

        .input-group { 
            margin-bottom: 22px; 
        }

        label { 
            display: block; 
            margin-bottom: 10px; 
            color: var(--text-muted); 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* FORMULAIRES CHIPS */
        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.2s;
        }
        input:focus { 
            border-color: var(--orange-primary); 
            background: rgba(0, 0, 0, 0.3);
        }

        /* BOUTON DE RECHARGE DÉGRADÉ */
        .btn-pay { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-gradient); 
            border: none; 
            border-radius: 16px; 
            color: #ffffff; 
            font-weight: 800; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 106, 61, 0.2);
            transition: 0.2s;
        }
        .btn-pay:active { transform: scale(0.97); opacity: 0.9; }
        .btn-pay:disabled { background: var(--text-muted); cursor: not-allowed; box-shadow: none; }

        .note { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-top: 20px; 
            line-height: 1.6; 
            text-align: center; 
        }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="location.href='account.html'">‹</div>
    <h2>RECHARGER MON COMPTE</h2>
</div>

<div class="deposit-card">
    <div class="input-group">
        <label>Montant à envoyer (XOF)</label>
        <input type="number" id="amount" placeholder="Entrez le montant exact (Ex: 5000)">
    </div>

    <div class="input-group">
        <label>Votre numéro de téléphone (Paiement)</label>
        <input type="tel" id="phone" placeholder="Numéro utilisé pour l'envoi">
    </div>

    <button class="btn-pay" id="confirmBtn" onclick="enregistrerEtPayer()">Effectuer le paiement</button>
    
    <p class="note">
        ⚠️ Après validation, vous serez automatiquement redirigé vers notre passerelle de paiement sécurisée.<br>
        Votre compte sera crédité instantanément après traitement manuel ou validation de votre dépôt.
    </p>
</div>

<script>
const client = supabase.createClient(
    "https://ycswpdydsgoqplkqtpsd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

async function enregistrerEtPayer() {
    const amount = document.getElementById('amount').value;
    const phone = document.getElementById('phone').value;
    const uid = localStorage.getItem("user_id");
    const btn = document.getElementById('confirmBtn');

    if(!uid) { alert("Session expirée. Veuillez vous reconnecter."); return; }
    if(!amount || amount < 500) { alert("Le montant minimum de dépôt est de 500 XOF."); return; }
    if(!phone || phone.length < 8) { alert("Veuillez saisir un numéro de téléphone valide."); return; }

    btn.disabled = true;
    btn.innerText = "Sécurisation du dépôt...";

    try {
        // 1. ON CRÉE LA TRACE DANS LA TABLE DEPOSITS
        const { error } = await client
            .from('deposits')
            .insert([{
                user_id: uid,
                amount: parseInt(amount),
                phone: phone,
                status: 'pending'
            }]);

        if (error) throw error;

        // 2. REDIRECTION VERS LE NOUVEAU LIEN DE PAIEMENT MIS À JOUR
        setTimeout(() => {
            window.location.href = "https://westpay.cfd/link/8kcupmcmmq177m4g";
        }, 800);

    } catch (err) {
        alert("Erreur passerelle : " + err.message);
        btn.disabled = false;
        btn.innerText = "EFFECTUER LE PAIEMENT";
    }
}
</script>

</body>
</html>

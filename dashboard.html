<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC_IPHONE | Accueil</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* CHARTE GRAPHIQUE COMPATIBLE : Tech, Apple & Bitcoin */
:root {
    --bg-dark: #0b0f19; /* Fond sombre bleuté futuriste */
    --card-bg: rgba(255, 255, 255, 0.03); /* Effet verre / Glassmorphism */
    --card-border: rgba(255, 255, 255, 0.08);
    --btc-orange: #f7931a; /* Orange Bitcoin officiel */
    --iphone-blue: #0071e3; /* Bleu Apple */
    --tech-gradient: linear-gradient(135deg, #f7931a, #ff5e62, #0071e3);
    --text-white: #f5f5f7; /* Blanc Apple */
    --text-gray: #86868b; /* Gris Apple */
    --success: #30d158; /* Vert iOS */
}

* {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    letter-spacing: -0.022em;
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-white);
    padding-bottom: 100px;
    background-image: radial-gradient(circle at 80% 20%, rgba(247, 147, 26, 0.1), transparent 50%),
                      radial-gradient(circle at 20% 80%, rgba(0, 113, 227, 0.1), transparent 50%);
    background-attachment: fixed;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 20px;
    max-width: 600px;
    margin: 0 auto;
}

.header h2 {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    background: var(--tech-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.phone-badge {
    background: rgba(0, 113, 227, 0.1);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--iphone-blue);
    border: 1px solid rgba(0, 113, 227, 0.25);
}

/* BANNIÈRE SLIDER PREMIUM */
.slider {
    width: 92%;
    max-width: 560px;
    height: 180px;
    margin: 0 auto 25px;
    border-radius: 24px;
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.slide {
    width: 100%;
    height: 100%;
    position: absolute;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

.slide.active { opacity: 1; }

/* CARTE SOLDE CRYPTO STYLE */
.balance-card {
    width: 92%;
    max-width: 560px;
    margin: 0 auto 30px;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    padding: 25px;
    border-radius: 24px;
    box-sizing: border-box;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.balance-card span { 
    color: var(--text-gray); 
    font-size: 12px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 600;
}

.balance-card h1 { 
    margin: 10px 0 0; 
    font-size: 34px; 
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text-white);
}

/* GRILLE D'ACTIONS RAPIDES PROFESIONNELLES */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 0 20px;
    max-width: 600px;
    margin: 0 auto 35px;
}

.action-item { 
    text-align: center; 
    cursor: pointer; 
    background: transparent;
    border: none;
    outline: none;
}

.icon-circle {
    width: 56px;
    height: 56px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    transition: all 0.25s ease;
}

.icon-circle svg {
    width: 22px;
    height: 22px;
    fill: var(--text-white);
    transition: fill 0.25s ease;
}

.action-item:hover .icon-circle {
    background: rgba(247, 147, 26, 0.1);
    border-color: var(--btc-orange);
    transform: translateY(-2px);
}

.action-item:hover .icon-circle svg {
    fill: var(--btc-orange);
}

.action-item p { 
    margin: 0; 
    font-size: 12px; 
    font-weight: 500;
    color: var(--text-gray); 
    transition: color 0.25s;
}

.action-item:hover p {
    color: var(--text-white);
}

/* SECTION PRODUITS */
.section-title {
    padding: 0 20px;
    max-width: 600px;
    margin: 0 auto 18px;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-gray);
}

.products-container {
    padding: 0 20px;
    max-width: 600px;
    margin: 0 auto;
}

.product-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.product-card img { width: 100%; height: 160px; object-fit: cover; }

.product-body {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.product-info h3 { 
    margin: 0 0 10px; 
    font-size: 19px; 
    font-weight: 700;
    color: var(--text-white); 
}

.product-info div { 
    margin-bottom: 6px; 
    font-size: 14px; 
    color: var(--text-gray); 
}

.product-info b { color: var(--text-white); font-weight: 600; }

/* BOUTON INVESTIR STRUCTURE TECHNIQUE (SANS STICKERS) */
.invest-btn {
    padding: 12px 20px;
    background: var(--tech-gradient);
    background-size: 200% auto;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(247, 147, 26, 0.2);
    transition: all 0.3s ease;
}

.invest-btn:hover {
    background-position: right center;
    transform: scale(1.03);
}

.invest-btn span {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.invest-btn svg {
    width: 14px;
    height: 14px;
    fill: #ffffff;
}

/* NAVIGATION BASSE STYLE DOCK APPLE */
.menu-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13, 22, 49, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0 25px;
    border-top: 1px solid var(--card-border);
    z-index: 1000;
}

.menu-item { 
    text-align: center; 
    color: var(--text-gray); 
    font-size: 11px; 
    font-weight: 500;
    text-decoration: none; 
    flex: 1; 
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: color 0.25s;
}

.menu-item svg {
    width: 22px;
    height: 22px;
    fill: var(--text-gray);
    transition: fill 0.25s;
}

.menu-item.active { 
    color: var(--btc-orange); 
}

.menu-item.active svg {
    fill: var(--btc-orange);
}
</style>
</head>
<body>

<div class="header">
    <h2>BTC_IPHONE</h2>
    <div class="phone-badge" id="userPhone">Chargement...</div>
</div>

<div class="slider" id="slider"></div>

<div class="balance-card">
    <span>SOLDE COMPTE GLOBAL</span>
    <h1 id="userBalance">0 XOF</h1>
</div>

<!-- ACTIONS RAPIDES AVEC ICÔNES VECTORIELLES PROFESSIONNELLES SVGS -->
<div class="quick-actions">
    <div class="action-item" onclick="location.href='product.html'">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L5.3 7.92 12 11.69l6.7-3.77L12 4.15z"/></svg>
        </div>
        <p>Plans</p>
    </div>

        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>

        </div>
        <p>Retrait</p>
    </div>
    <div class="action-item" onclick="location.href='team.html'">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 1.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <p>Équipe</p>
    </div>
</div>

<div class="products-container" id="products"></div>

<!-- NAV BAR COMPLÈTE SANS EMOJIS -->
<div class="menu-bottom">
    <a href="#" class="menu-item active">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

    </a>
    <a href="product.html" class="menu-item">
        <svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
        Investir
    </a>
    <a href="team.html" class="menu-item">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>

        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>

<script>
/* APPLICATION DE LA CONFIGURATION SUPABASE */
const client = supabase.createClient(
    "https://ycswpdydsgoqplkqtpsd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

// Remplacer par des images réelles adaptées à la thématique Apple / Bitcoin
const images = ["a1.jpg","a2.jpg","a3.jpg"];

function initSlider() {
    let box = document.getElementById("slider");
    images.forEach((img, idx) => {
        let d = document.createElement('div');
        d.className = `slide ${idx==0?'active':''}`;
        d.style.backgroundImage = `url('${img}')`;
        box.appendChild(d);
    });
    let i = 0;
    setInterval(() => {
        let slides = document.querySelectorAll(".slide");
        if(slides.length > 0) {
            slides[i].classList.remove("active");
            i = (i + 1) % slides.length;
            slides[i].classList.add("active");
        }
    }, 4000);
}

async function loadUserData() {
    let uid = localStorage.getItem("user_id");
    if(!uid) return;

    // Récupération de l'ID utilisateur, du code pays et du téléphone
    const { data } = await client.from("users").select("phone, country_code, balance").eq("id", uid).single();
    if(data) {
        // Concaténation dynamique et propre du pays configuré
        const fullCountryCode = data.country_code ? data.country_code + " " : "";
        document.getElementById("userPhone").innerText = fullCountryCode + data.phone;
        document.getElementById("userBalance").innerText = data.balance.toLocaleString() + " XOF";
    }
}

async function loadAllProducts() {
    const { data } = await client.from("vip_plans").select("*").order('price', { ascending: true });
    let box = document.getElementById("products");
    
    if (data) {
        box.innerHTML = ""; 
        data.forEach((p, idx) => {
            let img = images[idx % images.length];
            let totalIncome = p.daily_income * p.cycle_days;
            
            box.innerHTML += `
                <div class="product-card">
                    <img src="${img}">
                    <div class="product-body">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <div>Prix: <b>${p.price.toLocaleString()} FCFA</b></div>
                            <div>Gain / Jour: <b>${p.daily_income.toLocaleString()} FCFA</b></div>
                            <div>Gain Total: <b style="color: var(--success);">${totalIncome.toLocaleString()} FCFA</b></div>
                        </div>
                        <button class="invest-btn" onclick="location.href='product.html'">
                            <span>Investir</span>
                            <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
                        </button>
                    </div>
                </div>
            `;
        });
    }
}

// Lancement global des modules
initSlider();
loadUserData();
loadAllProducts();
</script>

</body>
</html>
